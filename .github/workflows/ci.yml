name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-root

      - name: Lint with flake8
        run: poetry run flake8 src/

      - name: Security check with bandit
        run: poetry run bandit -r src/

      - name: Run tests with coverage
        run: poetry run pytest --cov=src --cov-report=term --cov-fail-under=70

      - name: Cyclomatic complexity with radon
        run: poetry run radon cc -a -s src/ --min C

      - name: Code duplication with jscpd
        run: npx jscpd src/ --min-lines 5 --min-tokens 50 --threshold 5