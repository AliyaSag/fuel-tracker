name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install poetry
          poetry install --no-root

      - name: Lint with flake8
        run: |
          poetry run flake8 src/
          poetry run flake8 frontend/

      - name: Security check with bandit
        run: |
          poetry run bandit -c pyproject.toml -r src/ --exit-zero
          poetry run bandit -c pyproject.toml -r src/ -ll
          poetry run bandit -c pyproject.toml -r frontend/ --exit-zero
          poetry run bandit -c pyproject.toml -r frontend/ -ll

      - name: Run tests with coverage
        run: poetry run pytest --cov=src --cov=frontend --cov-report=term --cov-fail-under=70

      - name: Cyclomatic complexity with radon
        run: |
          poetry run radon cc src/ -s -n B
          COUNT=$(poetry run radon cc src/ -s -n C | grep -c . || true)
          if [ "$COUNT" -gt 0 ]; then
            echo "Functions with complexity > 10 found!"
            exit 1
          fi

      - name: Code duplication with jscpd
        run: |
          npx jscpd src/ --min-lines 5 --min-tokens 50 --threshold 5
          npx jscpd frontend/ --min-lines 5 --min-tokens 50 --threshold 5

      - name: Performance test with locust
        run: |
          PYTHONPATH=src poetry run uvicorn fuel_tracker.main:app &
          sleep 3
          poetry run locust -f tests/locustfile.py \
            --headless -u 10 -r 2 -t 30s \
            --host http://localhost:8000 \
            --only-summary